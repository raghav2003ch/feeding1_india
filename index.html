<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feeding India | Operations Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --z-red: #E23744; --z-dark: #1C1C1C; --z-bg: #F8F8F8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: white; color: var(--z-dark); overflow: hidden; }
        
        /* Tactical Calendar Colors */
        .day-nat { background: #FF7E8B !important; color: white !important; }
        .day-wkd { background: #4A90E2 !important; color: white !important; }
        .day-sch { background: #F4C430 !important; color: black !important; }
        .day-emg { background: var(--z-red) !important; color: white !important; }
        
        /* Zomato Design Components */
        .z-card { background: white; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; }
        .z-btn-main { background: var(--z-red); color: white; font-weight: 800; border-radius: 14px; height: 60px; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 100%; box-shadow: 0 4px 15px rgba(226, 55, 68, 0.2); }
        .z-btn-main:active { transform: scale(0.97); }
        
        /* Pattern Selector Buttons */
        .pattern-btn { border: 2px solid #f0f0f0; padding: 12px 16px; border-radius: 12px; font-weight: 700; font-size: 13px; text-align: center; background: #fff; transition: 0.2s; }
        .pattern-btn.active { border-color: var(--z-red); color: var(--z-red); background: #fff5f6; }

        /* Day/Week Selector UI */
        .wkd-row { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-radius: 20px; background: #fdfdfd; border: 1px solid #f3f3f3; margin-bottom: 12px; }
        .day-label { font-size: 18px; font-weight: 800; color: #1c1c1c; min-width: 100px; }
        .day-label.active { color: var(--z-red); }
        
        .num-grid { display: flex; gap: 8px; }
        .num-btn { width: 44px; height: 44px; border-radius: 12px; border: 2px solid #eee; font-size: 14px; font-weight: 800; transition: 0.2s; background: white; }
        .num-btn.active { background: var(--z-dark); color: white; border-color: var(--z-dark); }

        .wizard-step { display: none; height: 100%; flex-direction: column; }
        .wizard-step.active { display: flex; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Fixed Bottom Impact Banner */
        .impact-banner { background: #1C1C1C; color: white; padding: 12px 24px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

        @media (min-width: 1024px) {
            .desktop-main { display: grid; grid-template-columns: 280px 1fr 340px; height: 100vh; }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 1. LOGIN SCREEN -->
    <div id="loginGate" class="fixed inset-0 bg-white z-[300] flex flex-col items-center justify-center p-8">
        <img src="https://i.ibb.co/XfXfGZq/Feeding-India-Logo.png" class="h-14 mb-12">
        <div class="w-full max-w-sm space-y-5">
            <h1 id="t-loginTitle" class="text-2xl font-extrabold text-center">Partner Portal</h1>
            <input type="email" id="email" value="raghav.ch2003@gmail.com" class="w-full p-4 border rounded-xl outline-none focus:border-red-500 h-[56px]" placeholder="Email">
            <input type="password" id="password" value="12345" class="w-full p-4 border rounded-xl outline-none focus:border-red-500 h-[56px]" placeholder="Password">
            <button onclick="checkLogin()" id="t-btnLogin" class="z-btn-main shadow-lg">Login</button>
        </div>
    </div>

    <!-- 2. SETUP WIZARD -->
    <div id="setupWizard" class="fixed inset-0 bg-white z-[200] hidden flex flex-col">
        <header class="p-5 border-b flex items-center justify-between bg-white">
            <button onclick="wizardBack()" id="w-back" class="text-gray-400 font-bold flex items-center gap-1 opacity-0 pointer-events-none">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg> <span id="t-btnBack">Back</span>
            </button>
            <img src="https://i.ibb.co/XfXfGZq/Feeding-India-Logo.png" class="h-7">
            <div class="w-10"></div>
        </header>

        <div class="flex-grow overflow-y-auto p-6 flex flex-col items-center">
            <!-- Step 1: Welcome -->
            <div id="w-step1" class="wizard-step active w-full max-w-lg text-center">
                <div class="py-12">
                    <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6"><span class="text-4xl">👋</span></div>
                    <h2 id="t-welcome" class="text-3xl font-extrabold mb-4">Hello, Raghav!</h2>
                    <p id="t-welcomeSub" class="text-gray-500 text-lg">Set up your school schedule for March 2026.</p>
                </div>
                <div class="mt-auto pt-10"><button onclick="wizardNext()" id="t-btnStart" class="z-btn-main">Set Schedule</button></div>
            </div>

            <!-- Step 2: Weekly Holidays Redesign -->
            <div id="w-step2" class="wizard-step w-full max-w-2xl">
                <div class="mb-6">
                    <h2 id="t-weeklyHols" class="text-2xl font-extrabold mb-2">Weekly Holidays</h2>
                    <p id="t-weeklyHolsSub" class="text-gray-500 font-medium">Select a common pattern or tap dates to customize.</p>
                </div>

                <!-- Pattern Selector -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
                    <button onclick="applyPattern('sun')" class="pattern-btn" id="pat-sun">Every Sunday</button>
                    <button onclick="applyPattern('sat-sun')" class="pattern-btn" id="pat-both">Every Sat & Sun</button>
                    <button onclick="applyPattern('alt-sat')" class="pattern-btn" id="pat-alt">2nd & 4th Sat</button>
                    <button onclick="applyPattern('clear')" class="pattern-btn">Clear All</button>
                </div>

                <div id="weekend-controls" class="mb-32">
                    <!-- High-Impact Day Rows will be rendered here -->
                </div>

                <!-- Sticky Summary Footer for Wizard -->
                <div class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t lg:relative lg:p-0 lg:border-0 lg:mt-auto">
                    <div class="impact-banner">
                        <span class="text-xs font-bold uppercase text-gray-400" id="t-forecast">Expected Meals</span>
                        <span class="text-xl font-black" id="wizardForecast">0</span>
                    </div>
                    <button onclick="wizardNext()" id="t-btnNext" class="z-btn-main">Continue</button>
                </div>
            </div>

            <!-- Step 3: National Holidays -->
            <div id="w-step3" class="wizard-step w-full max-w-lg">
                <div class="mb-6"><h2 id="t-natHols" class="text-2xl font-extrabold mb-2">National Holidays</h2><p id="t-natHolsSub" class="text-gray-500 font-medium">Confirm regional holidays for March.</p></div>
                <div id="nat-checklist" class="space-y-3 mb-24"></div>
                <div class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t lg:relative lg:p-0 lg:border-0 lg:mt-auto"><button onclick="finishWizard()" id="t-btnFinish" class="z-btn-main">Finish</button></div>
            </div>
        </div>
    </div>

    <!-- 3. MAIN DASHBOARD (HIDDEN UNTIL LOGIN) -->
    <div id="mainContent" class="desktop-main flex-grow overflow-hidden hidden">
        <aside class="bg-white border-r p-8 hidden lg:flex flex-col">
            <img src="https://i.ibb.co/XfXfGZq/Feeding-India-Logo.png" class="h-10 mb-12">
            <nav class="space-y-3">
                <button id="nav-scan" onclick="setView('scan')" class="w-full flex items-center gap-4 p-4 rounded-xl font-extrabold bg-[#1C1C1C] text-white"><span>📷</span> <span id="t-navAttendance">Attendance</span></button>
                <button id="nav-cal" onclick="setView('cal')" class="w-full flex items-center gap-4 p-4 rounded-xl font-bold text-gray-400 hover:bg-gray-50"><span>📅</span> <span id="t-navCalendar">Calendar</span></button>
            </nav>
        </aside>

        <main class="flex flex-col bg-[#FDFDFD] overflow-hidden">
            <header class="p-4 border-b flex justify-between items-center bg-white px-6">
                <img src="https://i.ibb.co/XfXfGZq/Feeding-India-Logo.png" class="h-6 lg:hidden">
                <h2 id="view-header" class="text-xl font-extrabold">Attendance</h2>
                <select onchange="updateLang(this.value)" class="bg-gray-100 rounded-xl px-4 py-2 font-bold text-sm outline-none">
                    <option value="en">English</option>
                    <option value="hi">हिन्दी</option>
                </select>
            </header>

            <div class="flex-grow p-4 lg:p-8 overflow-y-auto">
                <div id="view-scan" class="h-full flex flex-col items-center justify-center space-y-8">
                    <div class="w-full max-w-sm aspect-square bg-gray-900 rounded-[48px] relative overflow-hidden flex items-center justify-center shadow-2xl border-[12px] border-gray-800">
                        <div class="absolute w-full h-1 bg-green-500 top-0 animate-[bounce_3s_infinite]"></div>
                        <p class="text-white/30 font-black text-xs tracking-widest uppercase">Scanner Active</p>
                    </div>
                </div>

                <div id="view-cal" class="hidden max-w-2xl mx-auto flex flex-col">
                    <div class="z-card p-8 mb-6">
                        <div class="flex items-center justify-between mb-8"><h3 class="text-2xl font-extrabold">March 2026</h3></div>
                        <div id="mainGrid" class="grid grid-cols-7 gap-y-6 text-center"></div>
                    </div>
                </div>
            </div>
        </main>

        <aside class="bg-white border-l p-8 hidden lg:flex flex-col justify-center items-center">
            <div class="bg-black text-white p-8 rounded-[40px] shadow-2xl w-full text-center">
                <h4 id="mealForecast" class="text-5xl font-black text-white mb-2">0</h4>
                <p id="t-forecast-main" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Expected Meals</p>
            </div>
        </aside>
    </div>

    <script>
        const i18n = {
            en: {
                welcome: "Hello, Raghav!", welcomeSub: "Set up your schedule for accurate meal forecasts.",
                btnStart: "Set Schedule", weeklyHols: "Weekly Holidays", weeklyHolsSub: "Apply a pattern or toggle specific weeks.",
                btnNext: "Continue", btnBack: "Back", natHols: "National Holidays", btnFinish: "Finish Setup",
                navAttendance: "Attendance", navCalendar: "Calendar", forecast: "Expected Meals",
                days: ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
                nats: ["Holi", "Eid"]
            },
            hi: {
                welcome: "नमस्ते, राघव!", welcomeSub: "भोजन के पूर्वानुमान के लिए अपनी समय-सारणी सेट करें।",
                btnStart: "शिड्यूल सेट करें", weeklyHols: "साप्ताहिक छुट्टियां", weeklyHolsSub: "एक पैटर्न चुनें या विशिष्ट सप्ताह बदलें।",
                btnNext: "आगे बढ़ें", btnBack: "पीछे", natHols: "राष्ट्रीय छुट्टियां", btnFinish: "सेटअप पूरा करें",
                navAttendance: "उपस्थिति", navCalendar: "कैलेंडर", forecast: "अनुमानित भोजन",
                days: ["रविवार", "सोमवार", "मंगलवार", "बुधवार", "गुरुवार", "शुक्रवार", "शनिवार"],
                nats: ["होली", "ईद"]
            }
        };

        let app = { 
            lang: 'en', studentCount: 450, wizardStep: 1, 
            holidayData: {}, weekendConfig: { 0: [1,2,3,4,5] }, 
            activeNationals: [0, 1] 
        };

        function checkLogin() { 
            if(document.getElementById('email').value === 'raghav.ch2003@gmail.com' && document.getElementById('password').value === '12345') { 
                document.getElementById('loginGate').classList.add('hidden'); 
                document.getElementById('setupWizard').classList.remove('hidden'); 
                renderWizard(); 
            } 
        }

        function wizardNext() {
            if(app.wizardStep < 3) {
                document.getElementById(`w-step${app.wizardStep}`).classList.remove('active');
                app.wizardStep++;
                document.getElementById(`w-step${app.wizardStep}`).classList.add('active');
                if(app.wizardStep === 3) renderNatList();
                document.getElementById('w-back').style.opacity = "1"; 
                document.getElementById('w-back').style.pointerEvents = "auto";
            }
        }

        function wizardBack() {
            if(app.wizardStep > 1) {
                document.getElementById(`w-step${app.wizardStep}`).classList.remove('active');
                app.wizardStep--;
                document.getElementById(`w-step${app.wizardStep}`).classList.add('active');
                if(app.wizardStep === 1) { 
                    document.getElementById('w-back').style.opacity = "0"; 
                    document.getElementById('w-back').style.pointerEvents = "none"; 
                }
            }
        }

        function finishWizard() { 
            document.getElementById('setupWizard').classList.add('hidden'); 
            document.getElementById('mainContent').classList.remove('hidden'); 
            renderCalendar(); 
        }

        // --- NEW PATTERN LOGIC ---
        function applyPattern(type) {
            app.weekendConfig = {};
            if(type === 'sun') { app.weekendConfig[0] = [1,2,3,4,5]; }
            else if(type === 'sat-sun') { app.weekendConfig[0] = [1,2,3,4,5]; app.weekendConfig[6] = [1,2,3,4,5]; }
            else if(type === 'alt-sat') { app.weekendConfig[0] = [1,2,3,4,5]; app.weekendConfig[6] = [2,4]; }
            
            // UI Feedback for Pattern Buttons
            document.querySelectorAll('.pattern-btn').forEach(btn => btn.classList.remove('active'));
            if(type !== 'clear') event.target.classList.add('active');
            
            renderWizard();
        }

        function renderWizard() {
            const container = document.getElementById('weekend-controls'); 
            container.innerHTML = '';
            i18n[app.lang].days.forEach((day, idx) => {
                const config = app.weekendConfig[idx] || [];
                const isActive = config.length > 0;
                container.innerHTML += `
                <div class="wkd-row">
                    <div class="day-label ${isActive ? 'active' : ''}">${day}</div>
                    <div class="num-grid">
                        ${[1, 2, 3, 4, 5].map(n => `
                            <button onclick="toggleWeekNum(${idx}, ${n})" class="num-btn ${config.includes(n) ? 'active' : ''}">${n}</button>
                        `).join('')}
                    </div>
                </div>`;
            });
            updateForecastUI();
        }

        function toggleWeekNum(dayIdx, num) {
            if(!app.weekendConfig[dayIdx]) app.weekendConfig[dayIdx] = [];
            if(app.weekendConfig[dayIdx].includes(num)) {
                app.weekendConfig[dayIdx] = app.weekendConfig[dayIdx].filter(x => x !== num);
                if(app.weekendConfig[dayIdx].length === 0) delete app.weekendConfig[dayIdx];
            } else {
                app.weekendConfig[dayIdx].push(num);
            }
            renderWizard();
        }

        function updateForecastUI() {
            let offDays = 0;
            for(let d=1; d<=31; d++) {
                const date = new Date(2026, 2, d);
                const occ = Math.floor((d-1)/7)+1;
                if(app.weekendConfig[date.getDay()]?.includes(occ)) offDays++;
                else if(app.activeNationals.includes(0) && d === 14) offDays++;
                else if(app.activeNationals.includes(1) && d === 31) offDays++;
                else if(app.holidayData[d]) offDays++;
            }
            const count = ((31 - offDays) * app.studentCount).toLocaleString();
            document.getElementById('wizardForecast').innerText = count;
            if(document.getElementById('mealForecast')) document.getElementById('mealForecast').innerText = count;
        }

        // --- CORE LOGIC PRESERVED ---
        function updateLang(l) { app.lang = l; renderWizard(); renderNatList(); renderCalendar(); }
        function renderNatList() {
            const list = document.getElementById('nat-checklist'); list.innerHTML = '';
            i18n[app.lang].nats.forEach((h, idx) => {
                const checked = app.activeNationals.includes(idx) ? 'checked' : '';
                list.innerHTML += `<div class="bg-gray-50 p-6 rounded-2xl border flex justify-between items-center"><span class="font-bold text-lg">${h}</span><input type="checkbox" onchange="toggleNat(${idx})" ${checked} class="w-7 h-7 accent-red-500"></div>`;
            });
        }
        function toggleNat(idx) { 
            if(app.activeNationals.includes(idx)) app.activeNationals = app.activeNationals.filter(i => i !== idx);
            else app.activeNationals.push(idx); 
            updateForecastUI();
        }
        function renderCalendar() {
            const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
            const first = new Date(2026, 2, 1).getDay();
            for(let p=0; p<first; p++) grid.innerHTML += `<div></div>`;
            for(let d=1; d<=31; d++) {
                const date = new Date(2026, 2, d);
                const occ = Math.floor((d-1)/7)+1;
                let type = 'none';
                if(app.activeNationals.includes(0) && d === 14) type = 'nat';
                else if(app.activeNationals.includes(1) && d === 31) type = 'nat';
                else if(app.weekendConfig[date.getDay()]?.includes(occ)) type = 'wkd';
                grid.innerHTML += `<div class="w-10 h-10 rounded-full flex items-center justify-center font-bold day-${type}">${d}</div>`;
            }
            updateForecastUI();
        }

        updateLang('en');
    </script>
</body>
</html>
