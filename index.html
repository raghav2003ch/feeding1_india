<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feeding India | Operations Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --z-red: #E23744; --z-dark: #1C1C1C; --z-bg: #F8F8F8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: white; color: var(--z-dark); overflow: hidden; }
        
        .day-nat { background: #FF7E8B !important; color: white !important; }
        .day-wkd { background: #4A90E2 !important; color: white !important; }
        .day-sch { background: #F4C430 !important; color: black !important; }
        .day-emg { background: var(--z-red) !important; color: white !important; }
        
        .z-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid #f0f0f0; }
        .z-btn-main { background: var(--z-red); color: white; font-weight: 800; border-radius: 12px; height: 56px; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 100%; }
        .z-btn-main:active { transform: scale(0.97); }
        .z-input { width: 100%; padding: 16px; border-radius: 12px; border: 1.5px solid #E8E8E8; outline: none; }
        .z-input:focus { border-color: var(--z-red); }

        .wizard-step { display: none; height: 100%; flex-direction: column; }
        .wizard-step.active { display: flex; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .day-circle { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; font-weight: 700; font-size: 0.95rem; position: relative; }
        .has-name::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: currentColor; border-radius: 50%; opacity: 0.6; }
        
        .wkd-btn.active { background: var(--z-red); color: white; border-color: var(--z-red); }
        .num-btn.active { background: var(--z-dark); color: white; }

        #actionSheet { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        #actionSheet.open { transform: translateY(0); }

        @media (min-width: 1024px) {
            .desktop-main { display: grid; grid-template-columns: 280px 1fr 340px; height: 100vh; }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 1. LOGIN SCREEN -->
    <div id="loginGate" class="fixed inset-0 bg-white z-[300] flex flex-col items-center justify-center p-8">
        <img src="https://i.ibb.co/XfXfGZq/Feeding-India-Logo.png" class="h-14 mb-12">
        <div class="w-full max-w-sm space-y-5">
            <h1 id="t-loginTitle" class="text-2xl font-extrabold text-center">Partner Portal</h1>
            <input type="email" id="email" value="raghav.ch2003@gmail.com" class="z-input" placeholder="Email">
            <input type="password" id="password" value="12345" class="z-input" placeholder="Password">
            <button onclick="checkLogin()" id="t-btnLogin" class="z-btn-main text-lg shadow-lg">Login</button>
        </div>
    </div>

    <!-- 2. ONBOARDING WIZARD -->
    <div id="setupWizard" class="fixed inset-0 bg-white z-[200] hidden flex flex-col">
        <header class="p-5 border-b flex items-center justify-between">
            <button onclick="wizardBack()" id="w-back" class="text-gray-400 font-bold flex items-center gap-1 opacity-0 pointer-events-none">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg> <span id="t-btnBack">Back</span>
            </button>
            <img src="https://i.ibb.co/XfXfGZq/Feeding-India-Logo.png" class="h-7">
            <div class="w-10"></div>
        </header>

        <div class="flex-grow overflow-y-auto p-6 flex flex-col items-center">
            <div id="w-step1" class="wizard-step active w-full max-w-lg text-center">
                <div class="py-12">
                    <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6"><span class="text-4xl">👋</span></div>
                    <h2 id="t-welcome" class="text-3xl font-extrabold mb-4">Hello, Raghav!</h2>
                    <p id="t-welcomeSub" class="text-gray-500 text-lg">Set up your schedule for accurate meal forecasts.</p>
                </div>
                <div class="mt-auto pt-10"><button onclick="wizardNext()" id="t-btnStart" class="z-btn-main">Set Schedule</button></div>
            </div>

            <div id="w-step2" class="wizard-step w-full max-w-lg">
                <div class="mb-6"><h2 id="t-weeklyHols" class="text-2xl font-extrabold mb-2">Weekly Holidays</h2><p id="t-weeklyHolsSub" class="text-gray-500 font-medium">Which days are closed every week?</p></div>
                <div id="weekend-controls" class="space-y-3 mb-24"></div>
                <div class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t lg:relative lg:p-0 lg:border-0 lg:mt-auto"><button onclick="wizardNext()" id="t-btnNext" class="z-btn-main">Next</button></div>
            </div>

            <div id="w-step3" class="wizard-step w-full max-w-lg">
                <div class="mb-6"><h2 id="t-natHols" class="text-2xl font-extrabold mb-2">National Holidays</h2><p id="t-natHolsSub" class="text-gray-500 font-medium">Confirm regional holidays.</p></div>
                <div id="nat-checklist" class="space-y-3 mb-24"></div>
                <div class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t lg:relative lg:p-0 lg:border-0 lg:mt-auto"><button onclick="finishWizard()" id="t-btnFinish" class="z-btn-main">Finish</button></div>
            </div>
        </div>
    </div>

    <!-- 3. MAIN DASHBOARD -->
    <div id="mainContent" class="desktop-main flex-grow overflow-hidden hidden">
        <aside class="bg-white border-r p-8 hidden lg:flex flex-col">
            <img src="https://i.ibb.co/XfXfGZq/Feeding-India-Logo.png" class="h-10 mb-12">
            <nav class="space-y-3">
                <button id="nav-scan" onclick="setView('scan')" class="w-full flex items-center gap-4 p-4 rounded-xl font-extrabold bg-[#1C1C1C] text-white"><span>📷</span> <span id="t-navAttendance">Attendance</span></button>
                <button id="nav-cal" onclick="setView('cal')" class="w-full flex items-center gap-4 p-4 rounded-xl font-bold text-gray-400 hover:bg-gray-50"><span>📅</span> <span id="t-navCalendar">Calendar</span></button>
            </nav>
        </aside>

        <main class="flex flex-col bg-[#FDFDFD] overflow-hidden">
            <header class="p-4 border-b flex justify-between items-center bg-white px-6">
                <img src="https://i.ibb.co/XfXfGZq/Feeding-India-Logo.png" class="h-6 lg:hidden">
                <h2 id="view-header" class="text-xl font-extrabold">Attendance</h2>
                <select onchange="updateLang(this.value)" class="bg-gray-100 rounded-xl px-4 py-2 font-bold text-sm outline-none">
                    <option value="en">English</option>
                    <option value="hi">हिन्दी</option>
                    <option value="mr">मराठी</option>
                </select>
            </header>

            <div class="flex-grow p-4 lg:p-8 overflow-y-auto">
                <div id="view-scan" class="h-full flex flex-col items-center justify-center space-y-8">
                    <div class="w-full max-w-sm aspect-square bg-gray-900 rounded-[48px] relative overflow-hidden flex items-center justify-center shadow-2xl border-[12px] border-gray-800">
                        <div class="absolute w-full h-1 bg-green-500 top-0 animate-[bounce_3s_infinite]"></div>
                        <p class="text-white/30 font-black text-xs tracking-widest uppercase">Scanner Active</p>
                    </div>
                    <button onclick="markEmergencyTomorrow()" class="w-full max-w-sm z-card p-6 flex items-center gap-5 border-l-8 border-red-500">
                        <span class="text-4xl">🚨</span><div class="text-left"><p id="t-update" class="font-black text-red-600 uppercase text-xs">Update</p><p id="t-closedTmr" class="font-extrabold text-lg">CLOSED TOMORROW</p></div>
                    </button>
                </div>

                <div id="view-cal" class="hidden max-w-2xl mx-auto flex flex-col">
                    <div class="z-card p-6 mb-6">
                        <div class="flex items-center justify-between mb-8"><h3 class="text-2xl font-extrabold">March 2026</h3></div>
                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8 text-[10px] font-black uppercase">
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full day-nat"></div><span id="t-lNat">National</span></div>
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full day-wkd"></div><span id="t-lWkd">Weekly Off</span></div>
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full day-sch"></div><span id="t-lSch">Holiday</span></div>
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full day-emg"></div><span id="t-lEmg">Emergency</span></div>
                        </div>
                        <div class="grid grid-cols-7 text-center font-bold text-gray-400 text-xs mb-4"><div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div></div>
                        <div id="mainGrid" class="grid grid-cols-7 gap-y-4"></div>
                    </div>
                </div>
            </div>
        </main>

        <aside class="bg-white border-l p-8 hidden lg:flex flex-col justify-center items-center">
            <div class="bg-black text-white p-8 rounded-[40px] shadow-2xl w-full text-center">
                <h4 id="mealForecast" class="text-5xl font-black text-white mb-2">0</h4>
                <p id="t-forecast" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Expected Meals</p>
            </div>
        </aside>
    </div>

    <div id="sheetOverlay" onclick="closeSheet()" class="fixed inset-0 bg-black/40 z-[400] hidden backdrop-blur-sm"></div>
    <div id="actionSheet" class="fixed bottom-0 left-0 right-0 bg-white z-[401] rounded-t-[32px] p-8 pb-12 shadow-2xl flex flex-col items-center">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mb-8"></div>
        <div id="sheetContent" class="w-full max-w-sm"></div>
    </div>

    <script>
        const i18n = {
            en: {
                loginTitle: "Partner Portal", btnLogin: "Login", welcome: "Hello, Raghav!", welcomeSub: "Set up your schedule for accurate meal forecasts.",
                btnStart: "Set Schedule", weeklyHols: "Weekly Holidays", weeklyHolsSub: "Which days are closed every week?", btnNext: "Next Step", btnBack: "Back",
                natHols: "National Holidays", natHolsSub: "Confirm regional holidays.", btnFinish: "Go to Dashboard", navAttendance: "Attendance", navCalendar: "Calendar",
                update: "Update", closedTmr: "CLOSED TOMORROW", lNat: "National", lWkd: "Weekly Off", lSch: "Holiday", lEmg: "Emergency", forecast: "Expected Meals",
                actionTitle: "Holiday Name", actionSave: "Save Holiday", actionRemove: "Remove Holiday",
                days: ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"], nats: ["Holi", "Eid"]
            },
            hi: {
                loginTitle: "पार्टनर पोर्टल", btnLogin: "लॉगिन", welcome: "नमस्ते, राघव!", welcomeSub: "भोजन के सही पूर्वानुमान के लिए अपनी समय-सारणी सेट करें।",
                btnStart: "शिड्यूल सेट करें", weeklyHols: "साप्ताहिक छुट्टियां", weeklyHolsSub: "हर हफ्ते कौन से दिन बंद रहते हैं?", btnNext: "अगला कदम", btnBack: "पीछे",
                natHols: "राष्ट्रीय छुट्टियां", natHolsSub: "क्षेत्रीय छुट्टियों की पुष्टि करें।", btnFinish: "डैशबोर्ड पर जाएं", navAttendance: "उपस्थिति", navCalendar: "कैलेंडर",
                update: "अपडेट", closedTmr: "कल बंद है", lNat: "राष्ट्रीय", lWkd: "साप्ताहिक छुट्टी", lSch: "छुट्टी", lEmg: "आपातकालीन", forecast: "अनुमानित भोजन",
                actionTitle: "छुट्टी का नाम", actionSave: "सेव करें", actionRemove: "छुट्टी हटाएं",
                days: ["रविवार", "सोमवार", "मंगलवार", "बुधवार", "गुरुवार", "शुक्रवार", "शनिवार"], nats: ["होली", "ईद"]
            },
            mr: {
                loginTitle: "पार्टनर पोर्टल", btnLogin: "लॉगिन", welcome: "नमस्कार, राघव!", welcomeSub: "जेवणाच्या अचूक अंदाजासाठी तुमचे वेळापत्रक सेट करा.",
                btnStart: "वेळापत्रक सेट करा", weeklyHols: "साप्ताहिक सुट्ट्या", weeklyHolsSub: "दर आठवड्याला कोणते दिवस बंद असतात?", btnNext: "पुढील पाऊल", btnBack: "मागे",
                natHols: "राष्ट्रीय सुट्ट्या", natHolsSub: "प्रादेशिक सुट्ट्यांची पुष्टी करा.", btnFinish: "डॅशबोर्डवर जा", navAttendance: "उपस्थिती", navCalendar: "कॅलेंडर",
                update: "अपडेट", closedTmr: "उद्या बंद आहे", lNat: "राष्ट्रीय", lWkd: "साप्ताहिक सुट्टी", lSch: "सुट्टी", lEmg: "आणीबाणी", forecast: "अपेक्षित जेवण",
                actionTitle: "सुट्टीचे नाव", actionSave: "जतन करा", actionRemove: "सुट्टी काढून टाका",
                days: ["रविवार", "सोमवार", "मंगळवार", "बुधवार", "गुरुवार", "शुक्रवार", "शनिवार"], nats: ["होली", "ईद"]
            }
        };

        let app = { lang: 'en', view: 'scan', studentCount: 450, wizardStep: 1, holidayData: {}, weekendConfig: { 0: [1,2,3,4,5] }, activeNationals: [0, 1] };

        function updateLang(l) {
            app.lang = l; const t = i18n[l];
            const ids = ['t-loginTitle','t-btnLogin','t-welcome','t-welcomeSub','t-btnStart','t-weeklyHols','t-weeklyHolsSub','t-btnNext','t-btnBack','t-natHols','t-natHolsSub','t-btnFinish','t-navAttendance','t-navCalendar','t-update','t-closedTmr','t-lNat','t-lWkd','t-lSch','t-lEmg','t-forecast'];
            ids.forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerText = t[id.replace('t-', '')]; });
            renderWizard(); renderNatList(); renderCalendar();
        }

        function checkLogin() { if(document.getElementById('email').value === 'raghav.ch2003@gmail.com' && document.getElementById('password').value === '12345') { document.getElementById('loginGate').classList.add('hidden'); document.getElementById('setupWizard').classList.remove('hidden'); renderWizard(); } }
        function wizardNext() { if(app.wizardStep < 3) { document.getElementById(`w-step${app.wizardStep}`).classList.remove('active'); app.wizardStep++; document.getElementById(`w-step${app.wizardStep}`).classList.add('active'); if(app.wizardStep === 3) renderNatList(); document.getElementById('w-back').style.opacity = "1"; document.getElementById('w-back').style.pointerEvents = "auto"; } }
        function wizardBack() { if(app.wizardStep > 1) { document.getElementById(`w-step${app.wizardStep}`).classList.remove('active'); app.wizardStep--; document.getElementById(`w-step${app.wizardStep}`).classList.add('active'); if(app.wizardStep === 1) { document.getElementById('w-back').style.opacity = "0"; document.getElementById('w-back').style.pointerEvents = "none"; } } }
        function finishWizard() { document.getElementById('setupWizard').classList.add('hidden'); document.getElementById('mainContent').classList.remove('hidden'); renderCalendar(); }
        
        function setView(v) { 
            app.view = v; document.getElementById('view-scan').classList.toggle('hidden', v !== 'scan'); document.getElementById('view-cal').classList.toggle('hidden', v !== 'cal'); 
            document.getElementById('view-header').innerText = v === 'scan' ? i18n[app.lang].navAttendance : i18n[app.lang].navCalendar;
            document.getElementById('nav-scan').className = v === 'scan' ? 'w-full flex items-center gap-4 p-4 rounded-xl font-extrabold bg-[#1C1C1C] text-white shadow-lg' : 'w-full flex items-center gap-4 p-4 rounded-xl font-bold text-gray-400 hover:bg-gray-50';
            document.getElementById('nav-cal').className = v === 'cal' ? 'w-full flex items-center gap-4 p-4 rounded-xl font-extrabold bg-[#1C1C1C] text-white shadow-lg' : 'w-full flex items-center gap-4 p-4 rounded-xl font-bold text-gray-400 hover:bg-gray-50';
        }

        function renderWizard() {
            const container = document.getElementById('weekend-controls'); container.innerHTML = '';
            i18n[app.lang].days.forEach((day, idx) => {
                const active = !!app.weekendConfig[idx];
                container.innerHTML += `<div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <button onclick="toggleDay(${idx})" class="wkd-btn px-4 py-2 rounded-xl border-2 font-bold text-sm ${active?'active':''}">${day}</button>
                    <div class="flex gap-1">${[1, 2, 3, 4, 5].map(n => `<button onclick="toggleWeekNum(${idx}, ${n})" class="num-btn w-9 h-9 rounded-lg border text-xs font-black ${app.weekendConfig[idx]?.includes(n)?'active':''}">${n}</button>`).join('')}</div>
                </div>`;
            });
        }

        function renderNatList() {
            const list = document.getElementById('nat-checklist'); list.innerHTML = '';
            i18n[app.lang].nats.forEach((h, idx) => {
                const checked = app.activeNationals.includes(idx) ? 'checked' : '';
                list.innerHTML += `<div class="bg-gray-50 p-5 rounded-2xl border border-gray-100 flex justify-between items-center"><span class="font-extrabold text-gray-700">${h}</span><input type="checkbox" onchange="toggleNat(${idx})" ${checked} class="w-6 h-6 accent-red-500"></div>`;
            });
        }

        function toggleDay(idx) { if(app.weekendConfig[idx]) delete app.weekendConfig[idx]; else app.weekendConfig[idx] = [1,2,3,4,5]; renderWizard(); }
        function toggleWeekNum(dayIdx, num) { if(!app.weekendConfig[dayIdx]) app.weekendConfig[dayIdx] = []; if(app.weekendConfig[dayIdx].includes(num)) app.weekendConfig[dayIdx] = app.weekendConfig[dayIdx].filter(x => x !== num); else app.weekendConfig[dayIdx].push(num); renderWizard(); }
        function toggleNat(idx) { if(app.activeNationals.includes(idx)) app.activeNationals = app.activeNationals.filter(i => i !== idx); else app.activeNationals.push(idx); }

        function renderCalendar() {
            const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
            const first = new Date(2026, 2, 1).getDay(); for(let p=0; p<first; p++) grid.innerHTML += `<div></div>`;
            let hCount = 0;
            for(let d=1; d<=31; d++) {
                const status = getDayStatus(d);
                const day = document.createElement('div');
                day.className = `day-circle day-${status.type} ${status.name ? 'has-name' : ''}`;
                day.innerText = d; day.onclick = () => { app.activeDay = d; openSheet(status.type === 'none' ? 'add' : 'view', status); };
                grid.appendChild(day); if(status.type !== 'none') hCount++;
            }
            document.getElementById('mealForecast').innerText = ((31 - hCount) * app.studentCount).toLocaleString();
        }

        function getDayStatus(d) {
            if(app.holidayData[d]) return app.holidayData[d];
            if(app.activeNationals.includes(0) && d === 14) return { type: 'nat', name: 'Holi' };
            if(app.activeNationals.includes(1) && d === 31) return { type: 'nat', name: 'Eid' };
            const date = new Date(2026, 2, d); const occ = Math.floor((d - 1) / 7) + 1;
            if(app.weekendConfig[date.getDay()]?.includes(occ)) return { type: 'wkd', name: i18n[app.lang].lWkd };
            return { type: 'none', name: '' };
        }

        function openSheet(mode, data) {
            const t = i18n[app.lang]; const content = document.getElementById('sheetContent');
            if(mode === 'add') {
                content.innerHTML = `<h3 class="text-xl font-extrabold mb-4">${t.actionTitle} (Mar ${app.activeDay})</h3><input id="hName" type="text" class="z-input mb-4" placeholder="e.g. Annual Day"><button onclick="saveHoliday()" class="z-btn-main">${t.actionSave}</button>`;
            } else {
                content.innerHTML = `<div class="text-center mb-6"><p class="text-xs font-bold text-gray-400 uppercase mb-1">Mar ${app.activeDay}</p><h3 class="text-2xl font-extrabold">${data.name}</h3></div><button onclick="removeHoliday()" class="w-full py-4 text-red-600 font-extrabold border-2 border-red-50 rounded-xl mb-4">${t.actionRemove}</button>`;
            }
            document.getElementById('sheetOverlay').classList.remove('hidden'); document.getElementById('actionSheet').classList.add('open');
        }

        function saveHoliday() { app.holidayData[app.activeDay] = { type: 'sch', name: document.getElementById('hName').value || 'Holiday' }; closeSheet(); renderCalendar(); }
        function removeHoliday() { delete app.holidayData[app.activeDay]; closeSheet(); renderCalendar(); }
        function closeSheet() { document.getElementById('sheetOverlay').classList.add('hidden'); document.getElementById('actionSheet').classList.remove('open'); }
        function markEmergencyTomorrow() { app.holidayData[4] = { type: 'emg', name: 'Emergency' }; renderCalendar(); }

        updateLang('en');
    </script>
</body>
</html>
