<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feeding India | Operations Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; overflow: hidden; }
        
        /* Google Calendar Circle Colors */
        .day-nat { background: #f97316 !important; color: white !important; }
        .day-wkd { background: #3b82f6 !important; color: white !important; }
        .day-sch { background: #fbbf24 !important; color: black !important; }
        .day-emg { background: #ef4444 !important; color: white !important; }
        
        .wizard-step { display: none; }
        .wizard-step.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Google Style Circular Markers */
        .day-circle { 
            width: 42px; 
            height: 42px; 
            margin: 0 auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 9999px; 
            cursor: pointer; 
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }
        .day-circle:hover { background-color: #f1f5f9; }
        .day-none { color: #3c4043; }

        .wkd-btn.active { background: #3b82f6; color: white; border-color: #2563eb; }
        .num-btn.active { background: #0f172a; color: white; border-color: #0f172a; }

        @media (min-width: 1024px) {
            .desktop-main { display: grid; grid-template-columns: 280px 1fr 340px; height: 100vh; }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="setupWizard" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-4">
        <div class="max-w-2xl w-full">
            
            <div id="w-step1" class="wizard-step active">
                <div class="mb-8 text-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/bd/Feeding_India_Logo.png" alt="Logo" class="h-14 mx-auto mb-6">
                    <h2 id="ws1-title" class="text-3xl font-black text-slate-900 mb-2">Weekly Holidays</h2>
                    <p id="ws1-sub" class="text-slate-500 font-bold">Which days is your school closed every week?</p>
                </div>
                <div id="weekend-controls" class="space-y-3 mb-10 max-h-[40vh] overflow-y-auto pr-2"></div>
                <button onclick="goToStep(2)" class="w-full bg-[#E23744] text-white py-6 rounded-3xl font-black uppercase text-lg shadow-xl active:scale-95 transition-all">Next: National Holidays</button>
            </div>

            <div id="w-step2" class="wizard-step">
                <div class="mb-8 text-center">
                    <h2 id="ws2-title" class="text-3xl font-black text-slate-900 mb-2">National Holidays</h2>
                    <p id="ws2-sub" class="text-slate-500 font-bold">Uncheck if the school is OPEN on these days.</p>
                </div>
                <div id="nat-checklist" class="space-y-3 mb-10">
                    </div>
                <button onclick="finishSetup()" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black uppercase text-lg shadow-xl active:scale-95 transition-all">Go to March Dashboard</button>
            </div>
        </div>
    </div>

    <div class="desktop-main flex-grow overflow-hidden">
        
        <aside class="bg-white border-r p-8 hidden lg:flex flex-col">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/bd/Feeding_India_Logo.png" alt="Logo" class="h-12 mb-12">
            <nav class="space-y-4">
                <button id="nav-scan" onclick="setView('scan')" class="w-full flex items-center gap-4 p-5 rounded-3xl font-bold bg-slate-900 text-white shadow-xl">
                    <span>📸</span> <span id="n-scan">Attendance</span>
                </button>
                <button id="nav-cal" onclick="setView('cal')" class="w-full flex items-center gap-4 p-5 rounded-3xl font-bold text-slate-400 hover:bg-slate-50">
                    <span>📅</span> <span id="n-cal">Calendar</span>
                </button>
            </nav>
        </aside>

        <main class="flex flex-col bg-white overflow-hidden">
            <header class="p-4 border-b flex justify-between items-center bg-white/50 backdrop-blur-md">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/bd/Feeding_India_Logo.png" alt="Logo" class="h-8 lg:hidden">
                <h2 id="view-header" class="text-xl font-black text-slate-900">Attendance</h2>
                <select id="langSelect" onchange="updateLang(this.value)" class="bg-slate-100 rounded-2xl px-4 py-2 font-bold outline-none cursor-pointer">
                    <option value="en">English</option>
                    <option value="hi">हिन्दी</option>
                    <option value="mr">मराठी</option>
                </select>
            </header>

            <div class="flex-grow p-4 overflow-hidden flex flex-col">
                
                <div id="view-scan" class="h-full flex flex-col items-center justify-center space-y-6">
                    <div class="w-full max-w-md aspect-square bg-slate-900 rounded-[50px] relative overflow-hidden flex items-center justify-center border-[10px] border-slate-800 shadow-2xl">
                        <div class="absolute w-full h-1.5 bg-green-500 top-0 animate-[bounce_3s_infinite] shadow-[0_0_30px_#22c55e]"></div>
                        <p class="text-white/20 font-black text-[10px] tracking-widest uppercase">Scanner Active</p>
                    </div>
                    
                    <button onclick="markEmergencyTomorrow()" class="w-full max-w-md bg-red-50 border-4 border-red-100 p-8 rounded-[40px] text-center active:scale-95 transition-all">
                        <p class="text-3xl mb-2">🚨</p>
                        <p id="em-t" class="font-black text-red-600 text-xl leading-none">CLOSED TOMORROW</p>
                        <p id="em-s" class="text-red-400 text-[10px] font-bold uppercase mt-2">Mark for Advance Order Update</p>
                    </button>
                </div>

                <div id="view-cal" class="hidden h-full flex flex-col">
                    <div class="flex items-center justify-between mb-8 px-4">
                        <h3 class="text-2xl font-semibold text-[#3c4043]">March 2026</h3>
                        <div class="flex gap-4 text-slate-400">
                            <span class="cursor-pointer">❮</span>
                            <span class="cursor-pointer">❯</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-2 mb-6 bg-white p-3 rounded-2xl border border-slate-100 text-[10px]">
                        <div class="flex items-center gap-2 font-bold"><div class="w-4 h-4 rounded-full day-nat"></div><span id="lg-n">National</span></div>
                        <div class="flex items-center gap-2 font-bold"><div class="w-4 h-4 rounded-full day-wkd"></div><span id="lg-w">Weekly Off</span></div>
                        <div class="flex items-center gap-2 font-bold"><div class="w-4 h-4 rounded-full day-sch"></div><span id="lg-s">Holiday</span></div>
                        <div class="flex items-center gap-2 font-bold"><div class="w-4 h-4 rounded-full day-emg"></div><span id="lg-e">Closed</span></div>
                    </div>

                    <div class="grid grid-cols-7 text-center font-bold text-slate-500 uppercase mb-4 text-xs">
                        <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
                    </div>
                    <div id="mainGrid" class="grid grid-cols-7 gap-y-3">
                        </div>

                    <button id="rangeToggle" onclick="toggleRangeMode()" class="w-full mt-auto p-4 rounded-2xl bg-white border-2 border-slate-200 font-black flex items-center justify-center gap-3 transition-all text-[10px] shadow-sm">
                        <span id="range-dot" class="w-3 h-3 rounded-full bg-slate-200"></span>
                        <span id="l-range">TAP START & END DATES (FOR VACATIONS)</span>
                    </button>
                </div>
            </div>
        </main>

        <aside class="bg-slate-50 border-l p-8 hidden lg:flex flex-col items-center justify-center">
            <div class="bg-slate-900 rounded-[40px] p-8 text-white shadow-2xl w-full text-center">
                <h4 id="mealForecast" class="text-5xl font-black text-orange-400 mb-2">0</h4>
                <p id="l-for" class="text-[10px] font-bold text-white/40 uppercase tracking-widest">Expected Meals</p>
                <button onclick="alert('Data Success: Monthly forecast updated.')" class="w-full mt-8 bg-[#E23744] text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Push Data</button>
            </div>
        </aside>
    </div>

    <script>
        const i18n = {
            en: {
                ws1: "Weekly Holidays", nats: ["Holi (Mar 14)", "Eid (Mar 31)", "Independence Day (Aug 15)", "Gandhi Jayanti (Oct 2)", "Diwali (Oct 29)"],
                nScan: "Attendance", nCal: "Calendar", range: "Tap Start & End (Vacations)", for: "Expected Meals",
                emT: "CLOSED TOMORROW", emS: "Mark for Advance Order Update",
                lgN: "National", lgW: "Weekly Off", lgS: "School Holiday", lgE: "Emergency",
                days: ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"]
            },
            hi: {
                ws1: "साप्ताहिक छुट्टियां", nats: ["होली (14 मार्च)", "ईद (31 मार्च)", "स्वतंत्रता दिवस (15 अगस्त)", "गांधी जयंती (2 अक्टूबर)", "दिवाली (29 अक्टूबर)"],
                nScan: "उपस्थिति", nCal: "कैलेंडर", range: "लंबी छुट्टी मोड", for: "भोजन आवश्यकता",
                emT: "कल स्कूल बंद है", emS: "कल का खाना अपडेट करें",
                lgN: "राष्ट्रीय", lgW: "साप्ताहिक", lgS: "स्कूल छुट्टी", lgE: "आपातकालीन",
                days: ["रविवार", "सोमवार", "मंगलवार", "बुधवार", "गुरुवार", "शुक्रवार", "शनिवार"]
            },
            mr: {
                ws1: "साप्ताहिक सुट्ट्या", nats: ["होळी (१४ मार्च)", "ईद (३१ मार्च)", "स्वातंत्र्य दिन (१५ ऑगस्ट)", "गांधी जयंती (२ ऑक्टोबर)", "दिवाळी (२९ ऑक्टोबर)"],
                nScan: "हजेरी", nCal: "कॅलेंडर", range: "मोठ्या सुट्ट्या मोड", for: "जेवण गरज",
                emT: "उद्या शाळा बंद आहे", emS: "उद्याची मागणी थांबवा",
                lgN: "राष्ट्रीय", lgW: "साप्ताहिक", lgS: "शाळा सुट्टी", lgE: "आणीबाणी",
                days: ["रविवार", "सोमवार", "मंगळवार", "बुधवार", "गुरुवार", "शुक्रवार", "शनिवार"]
            }
        };

        let app = {
            lang: 'en', view: 'scan', studentCount: 450, 
            rangeMode: false, rangeStart: null,
            holidayData: {}, weekendConfig: { 0: [1,2,3,4,5] },
            activeNationals: [0, 1] 
        };

        function updateLang(l) {
            app.lang = l; const t = i18n[l];
            document.getElementById('n-scan').innerText = t.nScan;
            document.getElementById('n-cal').innerText = t.nCal;
            document.getElementById('em-t').innerText = t.emT;
            document.getElementById('em-s').innerText = t.emS;
            document.getElementById('lg-n').innerText = t.lgN;
            document.getElementById('lg-w').innerText = t.lgW;
            document.getElementById('lg-s').innerText = t.lgS;
            document.getElementById('lg-e').innerText = t.lgE;
            renderWizard(); renderNatList(); renderCalendar();
        }

        function renderWizard() {
            const container = document.getElementById('weekend-controls'); container.innerHTML = '';
            i18n[app.lang].days.forEach((day, idx) => {
                const active = !!app.weekendConfig[idx];
                container.innerHTML += `<div class="flex items-center justify-between bg-slate-50 p-4 rounded-3xl border border-slate-100">
                    <button onclick="toggleDay(${idx})" class="wkd-btn px-4 py-3 rounded-2xl border-2 font-bold ${active?'active':''}">${day}</button>
                    <div class="flex gap-1">${[1, 2, 3, 4, 5].map(n => `<button onclick="toggleWeekNum(${idx}, ${n})" class="num-btn w-10 h-10 rounded-xl border text-xs font-black ${app.weekendConfig[idx]?.includes(n)?'active':''}">${n}</button>`).join('')}</div>
                </div>`;
            });
        }

        function renderNatList() {
            const list = document.getElementById('nat-checklist'); list.innerHTML = '';
            i18n[app.lang].nats.forEach((h, idx) => {
                const checked = app.activeNationals.includes(idx) ? 'checked' : '';
                list.innerHTML += `<div class="bg-slate-50 p-5 rounded-3xl border border-slate-100 flex justify-between items-center">
                    <span class="font-bold text-slate-800">${h}</span>
                    <input type="checkbox" onchange="toggleNat(${idx})" ${checked} class="w-6 h-6 accent-orange-500 cursor-pointer">
                </div>`;
            });
        }

        function toggleDay(idx) { if(app.weekendConfig[idx]) delete app.weekendConfig[idx]; else app.weekendConfig[idx] = [1,2,3,4,5]; renderWizard(); }
        function toggleWeekNum(dayIdx, num) { if(!app.weekendConfig[dayIdx]) app.weekendConfig[dayIdx] = []; if(app.weekendConfig[dayIdx].includes(num)) app.weekendConfig[dayIdx] = app.weekendConfig[dayIdx].filter(x => x !== num); else app.weekendConfig[dayIdx].push(num); renderWizard(); }
        function toggleNat(idx) { if(app.activeNationals.includes(idx)) app.activeNationals = app.activeNationals.filter(i => i !== idx); else app.activeNationals.push(idx); }

        function goToStep(s) { document.querySelectorAll('.wizard-step').forEach(step => step.classList.remove('active')); document.getElementById('w-step' + s).classList.add('active'); if(s === 2) renderNatList(); }
        function finishSetup() { document.getElementById('setupWizard').classList.add('hidden'); renderCalendar(); }
        function setView(v) { app.view = v; document.getElementById('view-scan').classList.toggle('hidden', v !== 'scan'); document.getElementById('view-cal').classList.toggle('hidden', v !== 'cal'); }

        function renderCalendar() {
            const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
            const first = new Date(2026, 2, 1).getDay(); // Sunday padding
            for(let p=0; p<first; p++) grid.innerHTML += `<div></div>`;
            let hCount = 0;
            for(let d=1; d<=31; d++) {
                const type = getDayStatus(d);
                const day = document.createElement('div');
                day.className = `day-circle day-${type} ${type==='none'?'day-none':''}`;
                if(app.rangeMode && app.rangeStart === d) day.classList.add('ring-2', 'ring-slate-900', 'ring-offset-1');
                day.innerText = d; day.onclick = () => onDayClick(d);
                grid.appendChild(day);
                if(type !== 'none') hCount++;
            }
            document.getElementById('mealForecast').innerText = ((31 - hCount) * app.studentCount).toLocaleString();
        }

        function getDayStatus(d) {
            if(app.holidayData[d]) return app.holidayData[d];
            if(app.activeNationals.includes(0) && d === 14) return 'nat'; 
            if(app.activeNationals.includes(1) && d === 31) return 'nat'; 
            const date = new Date(2026, 2, d); const dow = date.getDay();
            const occurrence = Math.floor((d - 1) / 7) + 1;
            if(app.weekendConfig[dow]?.includes(occurrence)) return 'wkd';
            return 'none';
        }

        function onDayClick(d) {
            if(!app.rangeMode) app.holidayData[d] = app.holidayData[d] === 'sch' ? 'none' : 'sch';
            else { if(app.rangeStart === null) app.rangeStart = d; else { const s = Math.min(app.rangeStart, d); const e = Math.max(app.rangeStart, d); for(let i=s; i<=e; i++) app.holidayData[i] = 'sch'; app.rangeStart = null; } }
            renderCalendar();
        }

        function markEmergencyTomorrow() { app.holidayData[4] = 'emg'; alert("Success: Tomorrow (March 4) marked CLOSED."); renderCalendar(); }
        function toggleRangeMode() { app.rangeMode = !app.rangeMode; app.rangeStart = null; document.getElementById('range-dot').classList.toggle('bg-green-500', app.rangeMode); renderCalendar(); }

        updateLang('en');
    </script>
</body>
</html>
